syntax = "proto3";

package IK_HTTP_APP;

message IKHTTPAPP {
    required uint32 appid = 1;
    required HTTPINFO http_info = 2;
    optional Flag match_flag = 3;
    required DIR dir = 4;
    required uint32 pkt_seq = 5;
    optional uint32 priority = 6;
    optional HTTPCaptureIP capture_ip = 7;
    optional uint32 rule_id = 8;
}
